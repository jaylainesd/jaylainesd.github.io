<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Math Test</title>
</head>
<body>

<!-- Start of Math Test -->

<h1>Online Math Test</h1>

<form>

    <label for="name">Your Name:</label>
    <input type="text" id="name" name="username">
    <br><br>

    <h2>Multiple Choice Questions</h2>

    <p>1. What is 8 &times; 6?</p>
    <input type="radio" name="q1" value="36">36<br>
    <input type="radio" name="q1" value="42">42<br>
    <input type="radio" name="q1" value="48">48<br>

    <p>2. What is 25 &divide; 5?</p>
    <input type="radio" name="q2" value="4">4<br>
    <input type="radio" name="q2" value="5">5<br>
    <input type="radio" name="q2" value="6">6<br>

    <p>3. What is 15 &minus; 7?</p>
    <input type="radio" name="q3" value="6">6<br>
    <input type="radio" name="q3" value="7">7<br>
    <input type="radio" name="q3" value="8">8<br>

    <h2>Word Problem</h2>

    <p>
        Sarah has 12 apples. She buys 5 more and then gives away 4.  
        How many apples does she have now?  
        Show your work using symbols like &plus;, &minus;, and &equals;.
    </p>

    <textarea name="wordproblem" rows="5" cols="40"></textarea>
    <br><br>

    <button type="submit">Submit Test</button>

</form>

<!-- End of Math Test -->

</body>
</html>
