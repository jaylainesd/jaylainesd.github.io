<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tropical Sunset Color Scheme</title>
</head>
<body>

<table border="1" cellpadding="10">
    <tr>
        <th colspan="4" style="font-size: 28px; font-weight: bold; font-style: italic;">
            Tropical Sunset
        </th>
    </tr>

    <tr>
        <th>Color Name</th>
        <th>Hex Value</th>
        <th>RGB Value</th>
        <th>HSL Value</th>
    </tr>

    <tr>
        <td style="background-color: #FF6B35;">Sunset Orange</td>
        <td>#FF6B35</td>
        <td>rgb(255, 107, 53)</td>
        <td>hsl(17, 100%, 60%)</td>
    </tr>

    <tr>
        <td style="background-color: #FFD166;">Golden Glow</td>
        <td>#FFD166</td>
        <td>rgb(255, 209, 102)</td>
        <td>hsl(42, 100%, 70%)</td>
    </tr>

    <tr>
        <td style="background-color: #06D6A0;">Tropical Mint</td>
        <td>#06D6A0</td>
        <td>rgb(6, 214, 160)</td>
        <td>hsl(162, 94%, 43%)</td>
    </tr>

    <tr>
        <td style="background-color: #118AB2; color: white;">Ocean Blue</td>
        <td>#118AB2</td>
        <td>rgb(17, 138, 178)</td>
        <td>hsl(196, 82%, 38%)</td>
    </tr>

</table>

</body>
</html>
