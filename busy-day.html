<!DOCTYPE html>
<html>
<head>
    <title>My Busy Day Schedule</title>

    <style>
        /* Style the entire table */
        table {
            width: 600px;
            border-collapse: collapse;
            margin: 20px auto;
            font-family: Arial, sans-serif;
            border: 3px solid #444;
        }

        /* Style all table cells */
        td, th {
            border: 1px solid #777;
            padding: 10px;
            text-align: left;
        }

        /* Style table headers */
        th {
            background-color: #222;
            color: white;
            font-size: 18px;
        }

        /* Style one specific row */
        tr.highlightRow {
            background-color: #f7e6ff;
            font-weight: bold;
        }

        /* Style one specific column */
        td.timeCol {
            background-color: #e8f4ff;
            width: 150px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2 style="text-align:center;">My Busy Day Schedule</h2>

<table>
    <tr>
        <th>Time</th>
        <th>Event</th>
    </tr>

    <tr class="highlightRow">
        <td class="timeCol">7:00 AM</td>
        <td>Wake up & get ready</td>
    </tr>

    <tr>
        <td class="timeCol">8:00 AM</td>
        <td>Breakfast</td>
    </tr>

    <tr>
        <td class="timeCol">9:00 AM</td>
        <td>School / Class</td>
    </tr>

    <tr>
        <td class="timeCol">12:00 PM</td>
        <td>Lunch</td>
    </tr>

    <tr>
        <td class="timeCol">1:00 PM</td>
        <td>Study session</td>
    </tr>

    <tr>
        <td class="timeCol">3:00 PM</td>
        <td>Guard practice</td>
    </tr>

    <tr>
        <td class="timeCol">5:00 PM</td>
        <td>Dinner</td>
    </tr>

    <tr>
        <td class="timeCol">7:00 PM</td>
        <td>Homework & assignments</td>
    </tr>

    <tr>
        <td class="timeCol">9:00 PM</td>
        <td>Shower & relax</td>
    </tr>

</table>

</body>
</html>
